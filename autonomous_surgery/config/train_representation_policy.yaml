defaults:
  - _self_
  - agent: representation_act
  - benchmark: cholecystectomy_act

# Experiment settings
seed: 42

dataloader:
  batch_size: 8
  num_workers: 8
  shuffle: True
  drop_last: True
  pin_memory: True

# Training settings
train:
  learning_rate: 0.001
  save_every_epochs: 10
  num_epochs: 200
  kl_weight: 1.0
  kl_warmup_epochs: 30
  use_vae: True

  # resume from checkpoint options  
  resume_from_checkpoint: null   # path/to/checkpoint.pth
  resume_optimizer: true
  
# Evaluation settings
evaluation:
  num_skip_epochs: 0
  validation_frequency_epochs: 3
  validation_trajs_num: 25
  save_best_model: True

# Logging settings
wandb: # frequently used args
  project: SURPASS
  group: null
  name: ${agent.name}_${task_name}_${camera_name}
  notes: ${task_name}
  reinit: True
  mode: offline