n_obs_steps: 1
chunk_size: 10
n_action_steps: 10

normalization_mapping:
  VISUAL: MEAN_STD
  STATE: MEAN_STD
  ACTION: MEAN_STD

vision_backbone: resnet152
pretrained_backbone_weights: ResNet152_Weights.IMAGENET1K_V1
replace_final_stride_with_dilation: false

pre_norm: false
dim_model: 512
n_heads: 8
dim_feedforward: 3200
feedforward_activation: relu
n_encoder_layers: 4
n_decoder_layers: 1

use_vae: true
latent_dim: 32
n_vae_encoder_layers: 4

temporal_ensemble_coeff: null

dropout: 0.1
kl_weight: 10.0

# optimizer_lr: 1.0e-5
# optimizer_weight_decay: 1.0e-4
# optimizer_lr_backbone: 1.0e-5
